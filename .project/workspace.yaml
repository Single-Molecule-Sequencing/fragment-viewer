id: fragment-viewer
title: Fragment Analysis Viewer
description: |
  Interactive React/JSX viewer and Cas9 cut-product predictor for the Athey lab
  Cleavage-Ligation-Cycling (CLC) fluorescent-adapter fragment analysis assay.
  Visualizes 4-dye CE electropherograms from the 226 bp V059_gRNA3 construct
  and predicts Cas9 cut products with automated peak classification.

repo: Single-Molecule-Sequencing/fragment-viewer
repo_path: /mnt/d/University of Michigan Dropbox/Gregory Farnum/Claude/Projects/fragment-viewer
default_branch: main
language: jsx
status: active

