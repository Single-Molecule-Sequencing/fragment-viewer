name: validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  jsx-parse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install esbuild
        run: npm install -g esbuild
      - name: Parse FragmentViewer.jsx
        run: esbuild --loader:.jsx=jsx --bundle=false --log-level=warning src/FragmentViewer.jsx > /dev/null
      - name: Parse FragmentViewer.scaffold.jsx
        run: esbuild --loader:.jsx=jsx --bundle=false --log-level=warning src/FragmentViewer.scaffold.jsx > /dev/null

  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install
        run: npm install
      - name: Vitest
        run: npx vitest run

  scaffold-in-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Regen scaffold and diff
        run: |
          cp src/FragmentViewer.scaffold.jsx /tmp/scaffold.jsx.committed
          python scripts/regen_scaffold.py
          diff /tmp/scaffold.jsx.committed src/FragmentViewer.scaffold.jsx \
            || { echo "::error::scaffold is out of sync with FragmentViewer.jsx; run python scripts/regen_scaffold.py"; exit 1; }

  biology-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify BIOLOGY.md and DYE_STRAND in sync
        run: |
          grep -q "Adapter 1 is labeled by the (B, Y) pair" docs/BIOLOGY.md \
            || { echo "::error::BIOLOGY.md missing (B,Y) + (G,R) pairing statement"; exit 1; }
          # Issue #13 Phase B.3: DYE_STRAND moved to src/lib/constants.js
          grep -qE "DYE_STRAND\s*=" src/lib/constants.js \
            || { echo "::error::DYE_STRAND map not found in src/lib/constants.js"; exit 1; }
          grep -qE "B[:\s]*\{.*strand:\s*['\"]bot['\"]" src/lib/constants.js \
            || { echo "::warning::Could not verify B strand assignment"; }
          echo "BIOLOGY.md and lib/constants.js consistency check passed"

  catalog-coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Count empty spacers in LAB_GRNA_CATALOG
        run: |
          # Issue #13 Phase B.1: LAB_GRNA_CATALOG moved to src/lib/grna_catalog.js
          EMPTY=$(grep -c 'spacer: ""' src/lib/grna_catalog.js || true)
          TOTAL=$(grep -cE '\{\s*name:' src/lib/grna_catalog.js || true)
          echo "::notice::LAB_GRNA_CATALOG: ${EMPTY} of ${TOTAL} entries have empty spacers"
          if [ "$EMPTY" -gt 0 ]; then
            echo "::warning::${EMPTY} catalog entries lack a 20 nt spacer; matchLabCatalog will not light up for them"
          fi

  python-syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install ruff + pyyaml + pytest + matplotlib + numpy + biopython + scipy
        run: pip install ruff pyyaml pytest matplotlib numpy biopython scipy
      - name: Compile Python scripts
        run: |
          python -m py_compile scripts/build_artifact.py
          python -m py_compile scripts/ingest_to_kb.py
          python -m py_compile scripts/regen_scaffold.py
          python -m py_compile scripts/cross_link_smaseq.py
          python -m py_compile scripts/fsa_to_json.py
          python -m py_compile skills/cas9-cut-predictor/scripts/cas9_cut_predictor.py
          python -m py_compile skills/genemapper-parser/scripts/genemapper_parser.py
          python -m py_compile skills/clc-construct-registry/scripts/clc_construct_registry.py
          python -m py_compile skills/clc-visualizations/scripts/clc_visualizations.py
      - name: Lint scripts and skills
        run: ruff check scripts/ skills/
      - name: Validate constructs.yaml
        run: python skills/clc-construct-registry/scripts/clc_construct_registry.py validate
      - name: Pytest skills
        run: |
          pytest skills/cas9-cut-predictor/tests/ -q
          pytest skills/genemapper-parser/tests/ -q
          pytest skills/clc-visualizations/tests/ -q

  ingest-roundtrip:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: inject_seed_json round-trip on the committed seed
        run: |
          python scripts/inject_seed_json.py data/seed_v059-4-5_grna3-1-1.json \
            --out /tmp/round_trip.jsx
          test -s /tmp/round_trip.jsx
          python -c "import json; d=json.load(open('data/seed_v059-4-5_grna3-1-1.json')); assert len(d['peaks'])>=2, f'expected >=2 samples, got {len(d[\"peaks\"])}'"

  seed-data-schema:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Validate seed JSON shape (data/seed_*.json)
        run: |
          python -c "
          import json, glob
          paths = sorted(glob.glob('data/seed_*.json'))
          assert paths, 'no data/seed_*.json files found'
          for p in paths:
              d = json.load(open(p))
              assert 'peaks' in d, f'{p}: missing top-level peaks key'
              for sample, dyes in d['peaks'].items():
                  assert isinstance(dyes, dict), f'{p} {sample}: peaks not a dict'
                  for dye, arr in dyes.items():
                      assert dye in ('B','G','Y','R','O'), f'{p} {sample}: unknown dye {dye}'
                      for row in arr:
                          assert len(row) == 4, f'{p} {sample}/{dye}: row should be [size,height,area,width], got {row}'
                          for v in row:
                              assert isinstance(v, (int,float)), f'{p} {sample}/{dye}: non-numeric {v}'
              print(f'{p}: {len(d[\"peaks\"])} samples valid')
          "
